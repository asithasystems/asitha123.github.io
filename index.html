<!DOCTYPE html>
<html>
<head>
  <title>Smart Home Control</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f6fa;
    }

    table {
      margin: auto;
      width: 60%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0px 0px 10px #ccc;
    }

    th, td {
      padding: 15px;
      border: 1px solid #ddd;
    }

    th {
      background: #4f46e5;
      color: white;
    }

    button {
      padding: 8px 12px;
      margin: 2px;
      cursor: pointer;
    }

    .on {
      color: green;
      font-weight: bold;
    }

    .off {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Smart Home Dashboard</h1>

<table>
  <tr>
    <th>Device</th>
    <th>Status</th>
    <th>Control</th>
  </tr>

  <tr>
    <td>Light</td>
    <td id="lightStatus">Loading...</td>
    <td>
      <button onclick="setDevice('living-light','ON')">ON</button>
      <button onclick="setDevice('living-light','OFF')">OFF</button>
    </td>
  </tr>

  <tr>
    <td>Fan</td>
    <td id="fanStatus">Loading...</td>
    <td>
      <button onclick="setDevice('living-fan','ON')">ON</button>
      <button onclick="setDevice('living-fan','OFF')">OFF</button>
    </td>
  </tr>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 FIREBASE CONFIG
// PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {

      apiKey: "AIzaSyD18HpPGJ-bIQdRafoIwA6QdKIYl6fCu4w",

      authDomain: "esp32homecontrol-5bfec.firebaseapp.com",

      databaseURL: "https://esp32homecontrol-5bfec-default-rtdb.firebaseio.com",

      projectId: "esp32homecontrol-5bfec",

      storageBucket: "esp32homecontrol-5bfec.firebasestorage.app",

      messagingSenderId: "468609632933",

      appId: "1:468609632933:web:8418c2e7228b9433c49b4c"
    };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// BUTTON CONTROL
window.setDevice = function(device, state) {
  set(ref(db, device), state);
};

// LIVE STATUS FUNCTION
function liveStatus(path, elementId)
{
  onValue(ref(db, path), (snapshot) =>
  {
    document.getElementById(elementId).innerText =
      snapshot.val();
  });
}

// LIVE UPDATES
liveStatus("living-light", "lightStatus");
liveStatus("living-fan", "fanStatus");

</script>

</body>
</html>
