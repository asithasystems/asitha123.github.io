<!DOCTYPE html>
<html>
<head>
  <title>Smart Home Control</title>
</head>

<body style="text-align:center;font-family:sans-serif;">

  <h1>Smart Home Dashboard</h1>

  <h3 id="status">Loading...</h3>

  <button onclick="setDevice('living-light','ON')">Light ON</button>
  <button onclick="setDevice('living-light','OFF')">Light OFF</button>

  <br><br>

  <button onclick="setDevice('living-fan','ON')">Fan ON</button>
  <button onclick="setDevice('living-fan','OFF')">Fan OFF</button>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔥 FIREBASE CONFIG (PUT YOUR VALUES)
    // PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {

      apiKey: "AIzaSyD18HpPGJ-bIQdRafoIwA6QdKIYl6fCu4w",

      authDomain: "esp32homecontrol-5bfec.firebaseapp.com",

      databaseURL: "https://esp32homecontrol-5bfec-default-rtdb.firebaseio.com",

      projectId: "esp32homecontrol-5bfec",

      storageBucket: "esp32homecontrol-5bfec.firebasestorage.app",

      messagingSenderId: "468609632933",

      appId: "1:468609632933:web:8418c2e7228b9433c49b4c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // SEND DATA TO FIREBASE
    window.setDevice = function(device, state) {
      set(ref(db, device), state);
    }

    // LIVE STATUS (for one device example)
    const lightRef = ref(db, "living-light");

    onValue(lightRef, (snapshot) => {
      document.getElementById("status").innerText =
        "Light Status: " + snapshot.val();
    });

  </script>

</body>
</html>
