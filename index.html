<!DOCTYPE html>
<html>
<head>
  <title>Smart Home Control</title>
</head>

<body style="text-align:center;font-family:sans-serif;">

  <h1>Smart Home Dashboard</h1>

  <h3 id="status">Loading...</h3>

  <button onclick="setDevice('living-light','ON')">Light ON</button>
  <button onclick="setDevice('living-light','OFF')">Light OFF</button>

  <br><br>

  <button onclick="setDevice('living-fan','ON')">Fan ON</button>
  <button onclick="setDevice('living-fan','OFF')">Fan OFF</button>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔥 FIREBASE CONFIG (PUT YOUR VALUES)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // SEND DATA TO FIREBASE
    window.setDevice = function(device, state) {
      set(ref(db, device), state);
    }

    // LIVE STATUS (for one device example)
    const lightRef = ref(db, "living-light");

    onValue(lightRef, (snapshot) => {
      document.getElementById("status").innerText =
        "Light Status: " + snapshot.val();
    });

  </script>

</body>
</html>
